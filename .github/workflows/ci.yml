name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Образ называется по репозиторию в нижнем регистре: ghcr.io/<owner>/<repo>.
env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # Линтер + типы + тесты. Гоняется и на PR, и на push в main.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Types (mypy)
        run: uv run mypy

      - name: Tests (pytest + coverage)
        run: uv run pytest -q

  # Сборка и публикация образа bot в GHCR. Только на push в main и только
  # после зелёных тестов. На PR не пушим (нет прав на пакеты у форков).
  build-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU — эмуляция arm64 на amd64-раннере, чтобы собрать оба варианта.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Мультиарх: amd64 (linux-сервер) + arm64 (Apple Silicon). Под каждый
          # тег публикуется manifest list — docker pull сам выберет нужную арх.
          platforms: linux/amd64,linux/arm64
          # latest — для авто-деплоя, sha — чтобы можно было откатиться на коммит.
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Кэш слоёв между прогонами Actions — ускоряет повторные сборки.
          cache-from: type=gha
          cache-to: type=gha,mode=max
