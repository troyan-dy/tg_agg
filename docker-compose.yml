services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tg
      POSTGRES_PASSWORD: tg
      POSTGRES_DB: tg_agg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg -d tg_agg"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file: .env
    environment:
      # Reach Postgres via the compose service name, not localhost.
      DATABASE_URL: postgresql+asyncpg://tg:tg@db:5432/tg_agg
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
